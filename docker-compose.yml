version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: echo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: echo
      POSTGRES_PASSWORD: echo
      POSTGRES_DB: echo
    ports:
      - "5432:5432"
    volumes:
      - echo_pg_data:/var/lib/postgresql/data
volumes:
  echo_pg_data:
